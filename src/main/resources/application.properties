spring.application.name=DataSyncDriver
server.port=8081

# ---- PostgreSQL Datasource (same container as DataSynchronizer) ----
spring.datasource.url=jdbc:postgresql://localhost:5432/mydatabase
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=myuser
spring.datasource.password=secret

# ---- JPA / Hibernate ----
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# ---- Seed Data ----
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# ---- Caffeine Cache ----
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=500,expireAfterWrite=30m

# ---- Kafka Consumer ----
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=datasync-driver
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
# ---- DataSynchronizer REST endpoint ----
driver.datasynchronizer.base-url=http://localhost:8080

# ---- Kafka Producer (cache invalidation) ----
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
driver.cache.invalidation-topic=config-cache-invalidation

# ---- Active Connector (csv or json) ----
driver.connector.type=csv

# ---- CSV Connector ----
driver.csv.output-path=sync-output.csv

# ---- JSON Connector ----
driver.json.output-path=sync-output.json

# ---- Swagger / OpenAPI ----
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

